# RBI (+ labelled non-RBI) document sources for CompliSense.
# Schema per document: name, url (prefer a DIRECT .pdf so the content-type guard
# in src/rag/ingest.py accepts it), file_name, optional alt_pdf, regulator
# (default RBI), in_force (false for drafts -> label & downrank), last_verified,
# and note. URLs verified 2026-06-25; the ingest pipeline re-validates each is a
# real PDF and fails loudly below MIN_EXPECTED_CHUNKS.

