# CompliSense — FastAPI SPA on :8000 (agent_runner subprocess for ML isolation)
#
# Quick start:
#   cp .env.example .env   # add API keys
#   docker compose up --build
#   open http://localhost:8000
#
# Optional RBI corpus (first time, ~5–15 min + embedding download):
#   docker compose --profile ingest run --rm ingest

name: complisense

volumes:
  compli-sense-data:
  compli-sense-hf-cache:

services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      RBI_DATA_PATH: /app/data
      CHROMA_DB_PATH: /app/data/chroma_db
      HF_HOME: /app/.cache/huggingface
      TRANSFORMERS_CACHE: /app/.cache/huggingface
      SENTENCE_TRANSFORMERS_HOME: /app/.cache/huggingface
      KMP_DUPLICATE_LIB_OK: "TRUE"
      OMP_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      # Set CS_AUTO_INGEST=true to build Chroma on first boot (slow).
      CS_AUTO_INGEST: ${CS_AUTO_INGEST:-false}
    volumes:
      - compli-sense-data:/app/data
      - compli-sense-hf-cache:/app/.cache/huggingface
    healthcheck:
      # Python stdlib — image has no curl (reduces OS CVE surface)
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=4)",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 45s
    restart: unless-stopped

  # One-shot: download RBI PDFs + build Chroma (shares volumes with app)
  ingest:
    build: .
    profiles: ["ingest"]
    env_file:
      - path: .env
        required: false
    environment:
      RBI_DATA_PATH: /app/data
      CHROMA_DB_PATH: /app/data/chroma_db
      HF_HOME: /app/.cache/huggingface
      TRANSFORMERS_CACHE: /app/.cache/huggingface
      SENTENCE_TRANSFORMERS_HOME: /app/.cache/huggingface
      KMP_DUPLICATE_LIB_OK: "TRUE"
      OMP_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
    volumes:
      - compli-sense-data:/app/data
      - compli-sense-hf-cache:/app/.cache/huggingface
    entrypoint: ["python", "ingest_data.py"]
